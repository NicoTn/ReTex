<line x1="0" y1="0" x2="0" y2="8" stroke="#48618C" stroke-width="2"/>
</pattern>
</defs>
<rect x="20" y="20" width="640" height="220" rx="26" fill="#141D30" stroke="#28395A" stroke-width="1.5"/>
